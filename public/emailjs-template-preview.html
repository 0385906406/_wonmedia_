<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EmailJS Template – WON Media</title>
</head>
<body style="margin:0;padding:32px 16px;background:#f1f5f9;font-family:'Segoe UI',Arial,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0">
    <tr><td align="center">
      <table width="520" cellpadding="0" cellspacing="0" style="max-width:520px;width:100%;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,0.08);">

        <!-- Header -->
        <tr>
          <td style="background:#062340;padding:24px 32px;display:flex;align-items:center;gap:12px;">
            <p style="margin:0;font-size:16px;font-weight:800;color:#fff;letter-spacing:-0.3px;">WON Media</p>
            <p style="margin:4px 0 0;font-size:12px;color:rgba(255,255,255,0.5);">Tin nhắn liên hệ mới từ website</p>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="padding:28px 32px;">

            <!-- Info rows -->
            <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:20px;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;">
              <tr style="border-bottom:1px solid #e2e8f0;">
                <td style="padding:10px 16px;background:#f8fafc;width:90px;">
                  <span style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.8px;">Họ tên</span>
                </td>
                <td style="padding:10px 16px;">
                  <span style="font-size:14px;color:#0f172a;font-weight:600;">{{from_name}}</span>
                </td>
              </tr>
              <tr style="border-bottom:1px solid #e2e8f0;">
                <td style="padding:10px 16px;background:#f8fafc;">
                  <span style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.8px;">Email</span>
                </td>
                <td style="padding:10px 16px;">
                  <a href="mailto:{{from_email}}" style="font-size:14px;color:#6366f1;text-decoration:none;">{{from_email}}</a>
                </td>
              </tr>
              <tr>
                <td style="padding:10px 16px;background:#f8fafc;">
                  <span style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.8px;">Chủ đề</span>
                </td>
                <td style="padding:10px 16px;">
                  <span style="font-size:14px;color:#0f172a;">{{subject}}</span>
                </td>
              </tr>
            </table>

            <!-- Message -->
            <p style="margin:0 0 8px;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.8px;">Nội dung</p>
            <div style="background:#f8fafc;border-left:3px solid #6366f1;border-radius:0 8px 8px 0;padding:14px 16px;margin-bottom:24px;">
              <p style="margin:0;font-size:14px;line-height:1.7;color:#334155;">{{message}}</p>
            </div>

            <!-- Reply button -->
            <a href="mailto:{{reply_to}}" style="display:inline-block;padding:11px 28px;background:#062340;color:#fff;font-size:13px;font-weight:700;text-decoration:none;border-radius:8px;">
              Trả lời →
            </a>

          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="padding:14px 32px;border-top:1px solid #f1f5f9;text-align:center;">
            <p style="margin:0;font-size:11px;color:#cbd5e1;">Gửi tự động từ <a href="https://wonmedia.vn" style="color:#6366f1;text-decoration:none;">wonmedia.vn</a></p>
          </td>
        </tr>

      </table>
    </td></tr>
  </table>

</body>
</html>
